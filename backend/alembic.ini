[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# The URL is injected from app.core.config at runtime; keeping it out of this
# file means credentials never land in version control.
sqlalchemy.url =

[post_write_hooks]
hooks = ruff
# console_scripts resolves ruff via the active interpreter's entry points, so
# this works inside a virtualenv without ruff being on PATH.
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
