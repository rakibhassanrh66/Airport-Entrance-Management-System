name: airport-ops

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-airport_ops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Without this the API can win the race to connect and crash-loop on boot.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airport} -d ${POSTGRES_DB:-airport_ops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    environment:
      AIRPORT_ENVIRONMENT: ${AIRPORT_ENVIRONMENT:-local}
      AIRPORT_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-airport}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-airport_ops}
      AIRPORT_JWT_SECRET: ${AIRPORT_JWT_SECRET:?AIRPORT_JWT_SECRET must be set}
      AIRPORT_DEBUG: ${AIRPORT_DEBUG:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    # No command override: the image's entrypoint already migrates then serves,
    # so compose and Render run the identical path.

volumes:
  pgdata:
