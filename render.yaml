# Render Blueprint — https://render.com/docs/blueprint-spec
#
# The application lives in backend/, not at the repository root. Both paths below
# are relative to the root, and getting them wrong is the failure mode you hit
# first: Render reports "failed to read dockerfile: open Dockerfile: no such file
# or directory" because it looked for /Dockerfile and found nothing.

databases:
  - name: airport-db
    databaseName: airport_ops
    user: airport
    plan: free

services:
  - type: web
    name: airport-ops-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend

    # /health is the liveness probe and deliberately does not touch the database,
    # so Render's health check cannot be held hostage by a slow database.
    # /ready is the one that checks Postgres.
    healthCheckPath: /health

    # No dockerCommand on purpose. The image's CMD (docker-entrypoint.sh) already
    # migrates then serves on $PORT.
    #
    # Do not be tempted to put the chain here instead. Render's dockerCommand is
    # not a shell: it expands $PORT but then execs the tokens directly, so
    #   alembic upgrade head && uvicorn ...
    # hands "&&" to alembic as a literal argument (exit 2), and wrapping it in
    # sh -c "..." fails differently (exit 127). Keeping it in the image means
    # compose, Render and a bare docker run are the same path.
    #
    # Migrations therefore run at container start. With more than one instance two
    # containers could race, but alembic takes a lock so the loser waits — and the
    # free plan runs a single instance anyway. preDeployCommand would be the
    # tidier home for this, but it is not available on the free plan.

    envVars:
      # Render hands out a postgres:// URL. Settings._require_async_driver
      # rewrites it to postgresql+psycopg:// — SQLAlchemy's async engine needs an
      # explicit async driver and would otherwise fail at connect time.
      - key: AIRPORT_DATABASE_URL
        fromDatabase:
          name: airport-db
          property: connectionString

      # Generated once by Render and held in the service. Never in the repo.
      - key: AIRPORT_JWT_SECRET
        generateValue: true

      # Disables /docs, /redoc and /openapi.json.
      - key: AIRPORT_ENVIRONMENT
        value: production

      - key: AIRPORT_DEBUG
        value: "false"
