name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest · PostgreSQL 16
    runs-on: ubuntu-latest

    # The suite refuses to run on SQLite by design: partial unique indexes, GiST
    # exclusion constraints and SELECT ... FOR UPDATE are the things under test,
    # and SQLite has none of them. So CI gets a real server.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: airport_ops
        ports:
          - 5432:5432
        # Without this the first connection races the server's own startup.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest swaps the final path segment for airport_ops_test and connects
      # to /postgres to create and drop it, so this user must own both.
      AIRPORT_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/airport_ops
      AIRPORT_ENVIRONMENT: test
      AIRPORT_JWT_SECRET: ci-secret-that-is-definitely-long-enough-32

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        # The schema is built by running the real migrations, so a green run also
        # proves alembic upgrade head still applies from scratch.
        run: python -m pytest -q
